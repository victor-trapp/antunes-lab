<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e2e2;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }

    .length-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .length-row label {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
    }

    .length-row input[type="range"] {
      flex: 1;
      accent-color: #7c6af7;
      cursor: pointer;
    }

    .length-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #7c6af7;
      min-width: 28px;
      text-align: right;
    }

    .output-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 52px;
    }

    #password-output {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: #c8f7a0;
      word-break: break-all;
    }

    #password-output.empty {
      color: #444;
      font-style: italic;
      font-family: inherit;
      letter-spacing: normal;
      font-size: 0.85rem;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #555;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .copy-btn:hover { color: #7c6af7; }
    .copy-btn.copied { color: #c8f7a0; }

    #generate-btn {
      width: 100%;
      padding: 14px;
      background: #7c6af7;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    #generate-btn:hover  { background: #6a58e0; }
    #generate-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Password Generator</h1>

    <div class="length-row">
      <label for="password-length">Length</label>
      <input type="range" id="password-length" min="4" max="12" value="4" />
      <span class="length-value" id="length-display">4</span>
    </div>

    <div class="output-row">
      <div id="password-output" class="empty">click generate</div>
      <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>

    <button id="generate-btn">Generate</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
